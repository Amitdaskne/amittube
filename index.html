<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloneTube - Home</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #f9f9f9; --skeleton: #e0e0e0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: #1a1a1a; margin: 0; padding-top: 80px; }
        
        header { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); 
            height: 70px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 5%; 
            position: fixed; 
            top: 0; left: 0; right: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.08); 
        }

        .logo-img { height: 42px; }
        .h-pfp { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            padding: 10px 5%; 
            max-width: 1500px; 
            margin: auto; 
        }

        /* Video Card Styles */
        .video-card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #eee; overflow: hidden; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 12px; display: flex; gap: 10px; }
        .v-title { margin: 0; font-size: 14px; font-weight: 600; line-height: 1.3; color: #000; }
        .v-meta { color: #606060; font-size: 12px; margin-top: 4px; }

        /* Skeleton Shimmer Animation */
        @keyframes shimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }

        .skeleton {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 800px 104px;
            display: inline-block;
            position: relative;
            animation: shimmer 1.2s linear infinite forwards;
        }

        .sk-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 12px; margin-bottom: 10px; }
        .sk-avatar { width: 36px; height: 36px; border-radius: 50%; }
        .sk-text { height: 12px; border-radius: 4px; margin-bottom: 8px; }
        .sk-title { width: 80%; }
        .sk-meta { width: 50%; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; padding: 0; gap: 0; }
            .video-card { border-radius: 0; border-bottom: 1px solid #eee; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="https://i.ibb.co/ycyyyg97/sign-removebg-preview.png" class="logo-img"></a>
        <div style="display:flex; align-items:center; gap:15px;">
            <a href="upload.html" style="text-decoration:none; color:black; font-size:24px;">▲</a>
            <a href="profile.html"><img id="hPfp" class="h-pfp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png"></a>
        </div>
    </header>

    <div class="grid" id="feed">
        <div class="sk-item">
            <div class="skeleton sk-thumb"></div>
            <div style="display:flex; gap:10px;">
                <div class="skeleton sk-avatar"></div>
                <div style="flex:1">
                    <div class="skeleton sk-text sk-title"></div>
                    <div class="skeleton sk-text sk-meta"></div>
                </div>
            </div>
        </div>
        <div class="sk-item">
            <div class="skeleton sk-thumb"></div>
            <div style="display:flex; gap:10px;">
                <div class="skeleton sk-avatar"></div>
                <div style="flex:1">
                    <div class="skeleton sk-text sk-title"></div>
                    <div class="skeleton sk-text sk-meta"></div>
                </div>
            </div>
        </div>
        <div class="sk-item">
            <div class="skeleton sk-thumb"></div>
            <div style="display:flex; gap:10px;">
                <div class="skeleton sk-avatar"></div>
                <div style="flex:1">
                    <div class="skeleton sk-text sk-title"></div>
                    <div class="skeleton sk-text sk-meta"></div>
                </div>
            </div>
        </div>
        </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyALHFd8-PhTpNSn8ipHlLsQYeUjEiBDRMs", 
            authDomain: "chat2-6bd92.firebaseapp.com", 
            databaseURL: "https://chat2-6bd92-default-rtdb.firebaseio.com", 
            projectId: "chat2-6bd92", 
            storageBucket: "chat2-6bd92.appspot.com", 
            messagingSenderId: "1033455440282", 
            appId: "1:1033455440282:web:9f867c81905dcd48902a23" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                if (user.photoURL) document.getElementById('hPfp').src = user.photoURL;
                loadVideos();
            }
        });

        function loadVideos() {
            const feed = document.getElementById('feed');

            db.ref('videos').on('value', snap => {
                // Clear the skeleton screen once data is received
                feed.innerHTML = "";
                
                if (!snap.exists()) {
                    feed.innerHTML = `<div style="text-align:center; grid-column:1/-1; padding-top:50px; color:#666;">No videos found.</div>`;
                    return;
                }

                snap.forEach(child => {
                    const v = child.val();
                    const thumb = v.thumbnail || 'https://via.placeholder.com/400x225?text=No+Thumbnail';
                    const pfp = v.uploaderPfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    const user = v.uploader ? v.uploader.split('@')[0] : 'Anonymous';

                    const card = `
                        <div class="video-card" onclick="window.location.href='watch.html?id=${child.key}'">
                            <div class="thumb-box"><img src="${thumb}"></div>
                            <div class="info">
                                <img src="${pfp}" style="width:36px; height:36px; border-radius:50%;">
                                <div>
                                    <h4 class="v-title">${v.title || 'Untitled'}</h4>
                                    <p class="v-meta">${user}</p>
                                </div>
                            </div>
                        </div>`;
                    feed.insertAdjacentHTML('afterbegin', card);
                });
            }, err => {
                feed.innerHTML = `<div style="text-align:center; grid-column:1/-1;">Error loading videos.</div>`;
            });
        }
    </script>
</body>
</html>
